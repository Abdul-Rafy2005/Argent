spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms

argent:
  jwt:
    secret: ${ARGENT_JWT_SECRET}
    expiration: ${ARGENT_JWT_EXPIRATION:900000}
    refresh-expiration: ${ARGENT_JWT_REFRESH_EXPIRATION:604800000}
  api:
    sandbox-mode: false
  cors:
    allowed-origins: ${ARGENT_CORS_ALLOWED_ORIGINS:}

logging:
  level:
    com.argent: INFO
    org.springframework.security: WARN
