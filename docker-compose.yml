services:
  postgres:
    image: postgres:16
    container_name: argent-postgres
    environment:
      POSTGRES_DB: argent_dev
      POSTGRES_USER: argent
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argent -d argent_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argent-network

  redis:
    image: redis:7-alpine
    container_name: argent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argent-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argent-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/argent_dev
      - SPRING_DATASOURCE_USERNAME=argent
      - SPRING_DATASOURCE_PASSWORD=devpassword
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - argent-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: argent-frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://argent-backend:8080
    depends_on:
      - backend
    networks:
      - argent-network

volumes:
  postgres_data:

networks:
  argent-network:
    driver: bridge
